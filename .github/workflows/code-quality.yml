name: Code Quality

on:
    push:
        branches: [main]
    pull_request:

jobs:
    test:
        name: Test & Coverage
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v7

            - name: Setup
              uses: ./.github/actions/setup

            - name: Run tests with coverage
              run: npm run test:coverage

            - name: Upload coverage reports to Codecov
              uses: codecov/codecov-action@v7
              with:
                  token: ${{ secrets.CODECOV_TOKEN }}
                  files: ./coverage/lcov.info
                  flags: unit

    integration:
        name: Integration (VS Code host)
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v7

            - name: Setup
              uses: ./.github/actions/setup

            # Cache the downloaded VS Code build (~270 MB) so only the first run
            # (or a bump to the pinned version) pays the download cost.
            - name: Cache VS Code test host
              uses: actions/cache@v6
              with:
                  path: .vscode-test
                  key: ${{ runner.os }}-vscode-test-${{ hashFiles('.vscode-test.mjs') }}
                  restore-keys: |
                      ${{ runner.os }}-vscode-test-

            # The smoke suite launches a real VS Code, which needs a display.
            # Coverage of the extension host is remapped to src/ and filtered to
            # the vscode-coupled layer (see the npm script), then merged at
            # Codecov with the unit report under a separate flag.
            - name: Run integration tests with coverage
              run: xvfb-run -a npm run test:integration:coverage

            - name: Upload integration coverage to Codecov
              uses: codecov/codecov-action@v7
              with:
                  token: ${{ secrets.CODECOV_TOKEN }}
                  files: ./coverage/integration/lcov.info
                  flags: integration

    typecheck:
        name: Typecheck
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v7

            - name: Setup
              uses: ./.github/actions/setup

            - name: Typecheck
              run: npm run typecheck

    prettier:
        name: Prettier
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v7

            - name: Setup
              uses: ./.github/actions/setup

            - name: Check formatting
              run: npm run prettier:check
