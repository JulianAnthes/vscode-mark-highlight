name: Setup
description: Set up Node.js and install npm dependencies with caching.

inputs:
    node-version:
        description: Node.js version to install.
        required: false
        default: '24'

runs:
    using: composite
    steps:
        - name: Setup Node
          uses: actions/setup-node@v5
          with:
              node-version: ${{ inputs.node-version }}
              cache: 'npm'

        - name: Install dependencies
          run: npm ci
          shell: bash
